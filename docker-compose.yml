services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: prioriza
      POSTGRES_USER: prioriza
      POSTGRES_PASSWORD: prioriza
  
    volumes:
      - prioriza_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prioriza -d prioriza"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/prioriza
      SPRING_DATASOURCE_USERNAME: prioriza
      SPRING_DATASOURCE_PASSWORD: prioriza
      SPRING_APPLICATION_JSON: '{"app":{"auth":{"username":"admin","password":"admin123"},"jwt":{"secret":"dev-secret-change-me-1234567890-1234567890-1234567890","expiration-minutes":120}}}'

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  prioriza_data:







